<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //array is collection of any data types
        let num =[3,5,6,7,8,9,10,12,14,6];

        console.log(num.lastIndexOf(14));  

        console.log(num.length);
        console.log(num.pop()); //remove last element 

        console.log("updated array "+num);

        console.log(num.push(99));
        console.log("updated array " +num);


        //shift and unshift 
        console.log(num.shift());
        console.log("updated array after shift " +num);

        //unshift 
        console.log(num.shift(45));
         console.log("updated array " +num);

         //slice and splice 
    </script>
    
</body>
</html>
